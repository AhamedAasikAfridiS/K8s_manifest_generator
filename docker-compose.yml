services:
  postgres:
    image: postgres:16-alpine
    container_name: k8s-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-k8s_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-k8s_password}
      POSTGRES_DB: ${POSTGRES_DB:-k8s_auth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-k8s_user} -d ${POSTGRES_DB:-k8s_auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./authservice
      dockerfile: Dockerfile
    container_name: k8s-auth-service
    restart: unless-stopped
    env_file:
      - ./authservice/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-k8s_user}:${POSTGRES_PASSWORD:-k8s_password}@postgres:5432/${POSTGRES_DB:-k8s_auth_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-in-production}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-agent-service:
    build:
      context: ./ai-agent-service
      dockerfile: Dockerfile
    container_name: k8s-ai-agent-service
    restart: unless-stopped
    env_file:
      - ./ai-agent-service/.env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-in-production}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8002:8002"
    volumes:
      - ai_uploads:/app/uploads
      - ai_generated:/app/generated
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: http://localhost:8001
        VITE_AI_API_URL: http://localhost:8002
    container_name: k8s-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - ai-agent-service

volumes:
  postgres_data:
  ai_uploads:
  ai_generated:
