# Sample combined output from the AI Agent Service (mock mode)
# --- configmap-web-app.yaml ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: production
data:
  APP_NAME: web-app
  ENVIRONMENT: production

# --- deployment-web-app.yaml ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
