apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: k8s-manifest-generator
type: Opaque
stringData:
  JWT_SECRET_KEY: change-me-in-production
  DATABASE_URL: postgresql://k8s_user:k8s_password@postgres:5432/k8s_auth_db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: k8s-manifest-generator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: k8s-manifest-generator/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: CORS_ORIGINS
              value: "http://localhost:3000,http://localhost:5173"
          envFrom:
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: k8s-manifest-generator
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
