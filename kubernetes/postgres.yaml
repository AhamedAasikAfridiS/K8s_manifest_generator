apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: k8s-manifest-generator
type: Opaque
stringData:
  POSTGRES_USER: k8s_user
  POSTGRES_PASSWORD: k8s_password
  POSTGRES_DB: k8s_auth_db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: k8s-manifest-generator
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: k8s-manifest-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: k8s-manifest-generator
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
